query_templates:
  - scope:
      platform: postgres
      database: mydb
      schema: public
      table: t1
    queries:
      - parameterized_intent: "total cost"
        parameterized_sql: |
          select * from t1
          where costtype = 1
      - parameterized_intent: "total budget"
        parameterized_sql: |
          select * from t1
          where costtype = 2
